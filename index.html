<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Single Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }

        nav {
            background: #333;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        nav a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        #content {
            padding: 80px 20px;
        }
    </style>

    <!-- Load a tiny Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

    <nav id="navbar"></nav>

    <div id="content">Loading…</div>

    <script>
        // Load Markdown file
        fetch("content.md")
            .then(response => response.text())
            .then(md => {
                const html = marked.parse(md);
                document.getElementById("content").innerHTML = html;

                // Build nav links from H1/H2 headings
                const navbar = document.getElementById("navbar");
                const headings = document.querySelectorAll("#content h1, #content h2");

                headings.forEach(h => {
                    const id = h.textContent.toLowerCase().replace(/\s+/g, "-");
                    h.id = id;

                    const link = document.createElement("a");
                    link.href = "#" + id;
                    link.textContent = h.textContent;
                    navbar.appendChild(link);
                });
            });
    </script>

</body>
</html>
